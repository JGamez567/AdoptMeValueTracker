<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adopt Me Value Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #111118; --surface2: #16161f;
    --border: rgba(255,255,255,0.07); --text: #e5e7eb; --muted: #6b7280;
    --legendary: #f59e0b; --ultra-rare: #8b5cf6; --rare: #3b82f6;
    --uncommon: #10b981; --common: #6b7280; --new: #f43f5e;
    --reg: #60a5fa; --neon: #a78bfa; --mega: #f59e0b;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }

  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; white-space: nowrap; }
  .logo span { color: var(--legendary); }
  .controls { display: flex; gap: 10px; align-items: center; flex: 1; flex-wrap: wrap; }
  input[type=search] {
    background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: 'Syne', sans-serif;
    font-size: 14px; padding: 8px 14px; width: 220px; outline: none; transition: border-color 0.2s;
  }
  input[type=search]:focus { border-color: rgba(255,255,255,0.2); }
  input[type=search]::placeholder { color: var(--muted); }
  .filter-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 6px; color: var(--muted); cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 11px; padding: 6px 12px;
    transition: all 0.15s; text-transform: capitalize;
  }
  .filter-btn:hover { color: var(--text); background: rgba(255,255,255,0.08); }
  .filter-btn.active { color: var(--text); border-color: currentColor; }
  .filter-btn[data-rarity="legendary"].active { color: var(--legendary); }
  .filter-btn[data-rarity="ultra rare"].active { color: var(--ultra-rare); }
  .filter-btn[data-rarity="rare"].active { color: var(--rare); }
  .filter-btn[data-rarity="uncommon"].active { color: var(--uncommon); }
  .filter-btn[data-rarity="new"].active { color: var(--new); }
  .filter-btn[data-rarity="rising"].active { color: #10b981; }
  .filter-btn[data-rarity="falling"].active { color: #f43f5e; }
  .refresh-btn {
    background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); cursor: pointer;
    font-family: 'Syne', sans-serif; font-size: 13px; padding: 8px 16px;
    margin-left: auto; transition: background 0.2s; white-space: nowrap;
  }
  .refresh-btn:hover:not(:disabled) { background: rgba(255,255,255,0.1); }
  .refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .stats { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); white-space: nowrap; }

  #grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px; padding: 20px 24px; max-width: 1600px; margin: 0 auto;
  }
  .pet-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 10px;
    transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    position: relative; overflow: hidden; cursor: pointer;
  }
  .pet-card:hover { border-color: rgba(255,255,255,0.2); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .pet-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--card-color, transparent); }

  .pet-card.is-new::after {
    content: 'NEW'; position: absolute; top: 10px; right: 10px;
    background: var(--new); color: white; font-family: 'DM Mono', monospace;
    font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px;
  }
  .pet-card.is-rising::after {
    content: '🚀'; position: absolute; top: 10px; right: 10px; font-size: 14px;
  }
  .pet-card.is-falling::after {
    content: '📉'; position: absolute; top: 10px; right: 10px; font-size: 14px;
  }
  .pet-card.is-new.is-rising::after { content: '🆕🚀'; font-size: 11px; }
  .pet-card.is-new.is-falling::after { content: '🆕📉'; font-size: 11px; }
  .pet-card.is-rising.is-falling::after { content: ''; }

  .chart-hint { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); text-align: center; opacity: 0; transition: opacity 0.2s; }
  .pet-card:hover .chart-hint { opacity: 1; }
  .pet-top { display: flex; align-items: center; gap: 10px; }
  .pet-img { width: 48px; height: 48px; object-fit: contain; border-radius: 8px; background: rgba(255,255,255,0.03); flex-shrink: 0; }
  .pet-img-placeholder { width: 48px; height: 48px; border-radius: 8px; background: rgba(255,255,255,0.04); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .pet-info { min-width: 0; }
  .pet-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pet-rarity { font-family: 'DM Mono', monospace; font-size: 10px; text-transform: capitalize; margin-top: 2px; }
  .pet-values { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .val-box { background: rgba(255,255,255,0.03); border-radius: 6px; padding: 6px 8px; text-align: center; }
  .val-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); display: block; margin-bottom: 2px; }
  .val-num { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; }
  .val-box.reg .val-num { color: var(--reg); }
  .val-box.neon .val-num { color: var(--neon); }
  .val-box.mega .val-num { color: var(--mega); }

  /* Falling indicator on card */
  .change-badge {
    position: absolute; bottom: 10px; right: 10px;
    font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 4px;
  }
  .change-badge.up { background: rgba(16,185,129,0.15); color: #10b981; }
  .change-badge.down { background: rgba(244,63,94,0.15); color: #f43f5e; }

  /* Modal */
  #modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
    align-items: center; justify-content: center; padding: 20px;
  }
  #modal-overlay.open { display: flex; }
  #modal {
    background: var(--surface); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px; width: 100%; max-width: 740px; max-height: 90vh;
    overflow-y: auto; padding: 28px; display: flex; flex-direction: column; gap: 18px;
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } }
  .modal-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
  .modal-pet-info { display: flex; align-items: center; gap: 14px; }
  .modal-img { width: 64px; height: 64px; object-fit: contain; border-radius: 12px; background: rgba(255,255,255,0.04); }
  .modal-img-placeholder { width: 64px; height: 64px; border-radius: 12px; background: rgba(255,255,255,0.04); display: flex; align-items: center; justify-content: center; font-size: 32px; }
  .modal-name { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .modal-rarity { font-family: 'DM Mono', monospace; font-size: 12px; margin-top: 4px; text-transform: capitalize; }
  .modal-change { font-family: 'DM Mono', monospace; font-size: 13px; margin-top: 6px; }
  .modal-change.up { color: #10b981; }
  .modal-change.down { color: #f43f5e; }
  .close-btn {
    background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    border-radius: 8px; color: var(--muted); cursor: pointer; font-size: 18px;
    width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
  }
  .close-btn:hover { color: var(--text); background: rgba(255,255,255,0.1); }

  .variant-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  .variant-tab {
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 6px; color: var(--muted); cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 11px; padding: 6px 12px; transition: all 0.15s;
  }
  .variant-tab:hover { color: var(--text); }
  .variant-tab.active { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); color: var(--text); }

  .modal-values { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .modal-val { background: var(--surface2); border-radius: 10px; padding: 14px; text-align: center; border: 1px solid var(--border); }
  .modal-val-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .modal-val-num { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 700; }
  .modal-val.reg .modal-val-num { color: var(--reg); }
  .modal-val.neon .modal-val-num { color: var(--neon); }
  .modal-val.mega .modal-val-num { color: var(--mega); }

  .range-tabs { display: flex; gap: 6px; }
  .range-tab {
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 8px; color: var(--muted); cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 12px; padding: 8px 18px; transition: all 0.15s;
  }
  .range-tab:hover { color: var(--text); }
  .range-tab.active { background: rgba(96,165,250,0.12); border-color: rgba(96,165,250,0.4); color: var(--reg); }

  .chart-wrap { position: relative; height: 260px; }
  .chart-note { font-family: 'DM Mono', monospace; font-size: 11px; color: #d97706; text-align: center; }
  .chart-empty { height: 260px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--muted); font-size: 13px; }
  .chart-empty-icon { font-size: 36px; opacity: 0.3; }
  .chart-loading { height: 260px; display: flex; align-items: center; justify-content: center; }
  .legend { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
  .series-btn {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px; color: var(--muted); cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 11px; padding: 5px 10px; transition: all 0.15s;
  }
  .series-btn.active { color: var(--sc); border-color: var(--sc); background: rgba(255,255,255,0.06); }
  .series-btn:not(.active) { opacity: 0.4; }
  .series-btn:hover { opacity: 1; }

  #status { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; min-height: 60vh; color: var(--muted); font-size: 15px; text-align: center; padding: 40px; }
  .spinner { width: 32px; height: 32px; border: 2px solid rgba(255,255,255,0.08); border-top-color: var(--reg); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: 10px; padding: 16px 24px; color: #f87171; font-size: 14px; max-width: 500px; }
  .retry-btn { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 8px; color: #f87171; cursor: pointer; font-family: 'Syne', sans-serif; font-size: 14px; padding: 10px 20px; margin-top: 8px; }
  .no-results { color: var(--muted); font-size: 14px; padding: 60px; text-align: center; grid-column: 1/-1; }
</style>
</head>
<body>

<header>
  <div class="logo">🐾 Adopt Me <span>Tracker</span></div>
  <div class="controls">
    <input type="search" id="search" placeholder="Search pets…">
    <div class="filter-btns" id="filters">
      <button class="filter-btn active" data-rarity="all">All</button>
      <button class="filter-btn" data-rarity="legendary">Legendary</button>
      <button class="filter-btn" data-rarity="ultra rare">Ultra Rare</button>
      <button class="filter-btn" data-rarity="rare">Rare</button>
      <button class="filter-btn" data-rarity="uncommon">Uncommon</button>
      <button class="filter-btn" data-rarity="common">Common</button>
      <button class="filter-btn" data-rarity="new" style="color:var(--new)">🆕 New</button>
      <button class="filter-btn" data-rarity="rising" style="color:#10b981">🚀 Rising</button>
      <button class="filter-btn" data-rarity="falling" style="color:#f43f5e">📉 Falling</button>
    </div>
    <span class="stats" id="stats"></span>
    <button class="refresh-btn" id="refreshBtn">↻ Refresh</button>
  </div>
</header>

<div id="status">
  <div class="spinner"></div>
  <p>Loading pets from Elvebredd…</p>
  <p style="font-size:12px;font-family:monospace;color:#4b5563">Make sure server.js is running on port 3001</p>
</div>
<div id="grid" style="display:none"></div>

<!-- Modal -->
<div id="modal-overlay">
  <div id="modal">
    <div class="modal-header">
      <div class="modal-pet-info">
        <div id="modal-img-wrap"></div>
        <div>
          <div class="modal-name" id="modal-name"></div>
          <div class="modal-rarity" id="modal-rarity"></div>
          <div class="modal-change" id="modal-change"></div>
        </div>
      </div>
      <button class="close-btn" id="closeModal">✕</button>
    </div>

    <div>
      <p style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:8px">VARIANT</p>
      <div class="variant-tabs" id="variantTabs">
        <button class="variant-tab active" data-variant="flyride">🦋🐴 Fly & Ride</button>
        <button class="variant-tab" data-variant="fly">🦋 Fly</button>
        <button class="variant-tab" data-variant="ride">🐴 Ride</button>
        <button class="variant-tab" data-variant="nopot">🚫 No Potion</button>
      </div>
    </div>

    <div class="modal-values" id="modal-values"></div>

    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
      <div class="range-tabs" id="rangeTabs">
        <button class="range-tab active" data-range="day">24H</button>
        <button class="range-tab" data-range="month">30D</button>
        <button class="range-tab" data-range="year">1Y</button>
      </div>
      <div class="legend" id="seriesToggle">
        <button class="series-btn active" data-series="0" style="--sc:#60a5fa">
          <div class="legend-dot" style="background:#60a5fa"></div>Regular
        </button>
        <button class="series-btn active" data-series="1" style="--sc:#a78bfa">
          <div class="legend-dot" style="background:#a78bfa"></div>Neon
        </button>
        <button class="series-btn active" data-series="2" style="--sc:#f59e0b">
          <div class="legend-dot" style="background:#f59e0b"></div>Mega
        </button>
      </div>
    </div>

    <div id="chart-area"></div>
    <p class="chart-note" id="chart-note" style="display:none"></p>
  </div>
</div>

<script>
const API = "https://adoptmevaluetracker.onrender.com";
const SEEN_KEY = "adoptme_seen_pets";
const HISTORY_KEY = "adoptme_value_history";

const rarityColor = r => ({
  legendary: "#f59e0b", "ultra rare": "#8b5cf6",
  rare: "#3b82f6", uncommon: "#10b981", common: "#6b7280",
}[(r ?? "").toLowerCase()] ?? "#6b7280");

const VARIANT_KEYS = {
  flyride: { reg: "value",     neon: "neonValue",  mega: "megaValue"  },
  fly:     { reg: "valueFly",  neon: "neonFly",    mega: "megaFly"    },
  ride:    { reg: "valueRide", neon: "neonRide",   mega: "megaRide"   },
  nopot:   { reg: "valueNoPot",neon: "neonNoPot",  mega: "megaNoPot"  },
};

let allPets = [], activeRarity = "all", searchQuery = "", newPetNames = new Set();
let chartInstance = null, currentPet = null, currentRange = "day", currentVariant = "flyride";
let risingPets = new Set();
let fallingPets = new Set();
let localHistory = JSON.parse(localStorage.getItem(HISTORY_KEY) || "{}");

const NEW_PET_TTL = 48 * 60 * 60 * 1000;

function saveLocalHistory() {
  localStorage.setItem(HISTORY_KEY, JSON.stringify(localHistory));
}

function logValue(name, value) {
  if (!value) return;
  if (!localHistory[name]) localHistory[name] = [];
  const last = localHistory[name].at(-1);
  if (!last || last.v !== value) {
    localHistory[name].push({ t: Date.now(), v: value });
    if (localHistory[name].length > 200) localHistory[name].shift();
  }
}

function getSeenPets() {
  try {
    const raw = JSON.parse(localStorage.getItem(SEEN_KEY) ?? "{}");
    if (Array.isArray(raw)) return new Map(raw.map(n => [n, 0]));
    return new Map(Object.entries(raw));
  } catch { return new Map(); }
}

function markAllSeen(pets) {
  const seen = getSeenPets();
  const now = Date.now();
  for (const p of pets) {
    if (!seen.has(p.name)) seen.set(p.name, now);
  }
  localStorage.setItem(SEEN_KEY, JSON.stringify(Object.fromEntries(seen)));
}

function isNewPet(name) {
  const seen = getSeenPets();
  if (!seen.has(name)) return false;
  const ts = seen.get(name);
  if (ts === 0) return false;
  return Date.now() - ts < NEW_PET_TTL;
}

function formatVal(v) {
  if (v == null) return "—";
  if (v >= 1000000) return (v/1000000).toFixed(1) + "M";
  if (v >= 1000) return (v/1000).toFixed(1) + "k";
  return Number(v).toLocaleString();
}

function formatDate(ts, range) {
  const d = new Date(ts);
  if (range === "day") return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  if (range === "year") return d.toLocaleDateString([], { month: "short", day: "numeric" });
  return d.toLocaleDateString([], { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
}

// Detect rising and falling from local history
function detectMovers() {
  risingPets = new Set();
  fallingPets = new Set();
  const dayAgo = Date.now() - 86400000;

  for (const pet of allPets) {
    const h = localHistory[pet.name];
    if (!h || h.length < 2) continue;
    const recent = h.filter(x => x.t >= dayAgo);
    if (recent.length < 2) continue;
    const first = recent[0].v;
    const last = recent[recent.length - 1].v;
    const diff = last - first;
    const pct = first > 0 ? (diff / first) * 100 : 0;
    if (diff > 0 && pct >= 1) risingPets.add(pet.name);
    if (diff < 0 && Math.abs(pct) >= 1) fallingPets.add(pet.name);
  }
  console.log(`[movers] ${risingPets.size} rising, ${fallingPets.size} falling`);
}

function getDayChange(name) {
  const h = localHistory[name];
  if (!h || h.length < 2) return null;
  const dayAgo = Date.now() - 86400000;
  const recent = h.filter(x => x.t >= dayAgo);
  if (recent.length < 2) {
    // Fall back to any two points
    const first = h[0].v, last = h[h.length-1].v;
    return last - first;
  }
  return recent[recent.length-1].v - recent[0].v;
}

function renderCard(pet) {
  const color = rarityColor(pet.rarity);
  const isNew = newPetNames.has(pet.name);
  const isRising = risingPets.has(pet.name);
  const isFalling = fallingPets.has(pet.name);
  const imgSrc = pet.image || `https://elvebredd.com/images/pets/${encodeURIComponent(pet.name)}.png`;
  const change = getDayChange(pet.name);
  const changeBadge = change !== null && change !== 0
    ? `<div class="change-badge ${change > 0 ? 'up' : 'down'}">${change > 0 ? '+' : ''}${formatVal(change)}</div>`
    : '';

  return `
    <div class="pet-card ${isNew?"is-new":""}${isRising?" is-rising":""}${isFalling?" is-falling":""}" style="--card-color:${color}" data-name="${pet.name}">
      <div class="pet-top">
        <img class="pet-img" src="${imgSrc}" alt="${pet.name}"
          onerror="this.outerHTML='<div class=\\'pet-img-placeholder\\'>🐾</div>'">
        <div class="pet-info">
          <div class="pet-name" title="${pet.name}">${pet.name}</div>
          <div class="pet-rarity" style="color:${color}">${pet.rarity ?? "Unknown"}</div>
        </div>
      </div>
      <div class="pet-values">
        <div class="val-box reg"><span class="val-label">Regular</span><span class="val-num">${formatVal(pet.value)}</span></div>
        <div class="val-box neon"><span class="val-label">Neon</span><span class="val-num">${formatVal(pet.neonValue)}</span></div>
        <div class="val-box mega"><span class="val-label">Mega</span><span class="val-num">${formatVal(pet.megaValue)}</span></div>
      </div>
      ${changeBadge}
      <div class="chart-hint">📈 Click for details & history</div>
    </div>`;
}

function render() {
  const grid = document.getElementById("grid");
  let filtered = allPets;
  if (activeRarity === "new") filtered = filtered.filter(p => newPetNames.has(p.name));
  else if (activeRarity === "rising") filtered = filtered.filter(p => risingPets.has(p.name));
  else if (activeRarity === "falling") filtered = filtered.filter(p => fallingPets.has(p.name));
  else if (activeRarity !== "all") filtered = filtered.filter(p => (p.rarity ?? "").toLowerCase() === activeRarity);
  if (searchQuery) filtered = filtered.filter(p => p.name.toLowerCase().includes(searchQuery));
  document.getElementById("stats").textContent = `${filtered.length} / ${allPets.length} pets`;
  grid.innerHTML = filtered.length ? filtered.map(renderCard).join("") : `<div class="no-results">No pets found</div>`;
}

function updateModalValues(pet, variant) {
  const keys = VARIANT_KEYS[variant];
  document.getElementById("modal-values").innerHTML = `
    <div class="modal-val reg">
      <div class="modal-val-label">Regular</div>
      <div class="modal-val-num">${formatVal(pet[keys.reg])}</div>
    </div>
    <div class="modal-val neon">
      <div class="modal-val-label">Neon</div>
      <div class="modal-val-num">${formatVal(pet[keys.neon])}</div>
    </div>
    <div class="modal-val mega">
      <div class="modal-val-label">Mega</div>
      <div class="modal-val-num">${formatVal(pet[keys.mega])}</div>
    </div>`;
}

function openModal(pet) {
  currentPet = pet;
  currentRange = "day";
  currentVariant = "flyride";

  const color = rarityColor(pet.rarity);
  const imgSrc = pet.image || `https://elvebredd.com/images/pets/${encodeURIComponent(pet.name)}.png`;
  const change = getDayChange(pet.name);
  const changeEl = document.getElementById("modal-change");
  if (change !== null && change !== 0) {
    changeEl.textContent = (change > 0 ? "▲ +" : "▼ ") + formatVal(change) + " today";
    changeEl.className = "modal-change " + (change > 0 ? "up" : "down");
  } else {
    changeEl.textContent = "";
  }

  document.getElementById("modal-name").textContent = pet.name;
  document.getElementById("modal-rarity").textContent = pet.rarity ?? "Unknown";
  document.getElementById("modal-rarity").style.color = color;
  document.getElementById("modal-img-wrap").innerHTML =
    `<img class="modal-img" src="${imgSrc}" alt="${pet.name}" onerror="this.outerHTML='<div class=\\'modal-img-placeholder\\'>🐾</div>'">`;

  document.querySelectorAll(".variant-tab").forEach(t => t.classList.toggle("active", t.dataset.variant === "flyride"));
  document.querySelectorAll(".range-tab").forEach(t => t.classList.toggle("active", t.dataset.range === "day"));
  document.querySelectorAll(".series-btn").forEach(b => b.classList.add("active"));

  updateModalValues(pet, "flyride");
  document.getElementById("modal-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
  renderLocalChart(pet, "day");
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
  document.body.style.overflow = "";
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
}

function renderLocalChart(pet, range) {
  const area = document.getElementById("chart-area");
  const noteEl = document.getElementById("chart-note");
  noteEl.style.display = "none";

  let h = localHistory[pet.name] || [];
  if (range === "day") h = h.filter(x => x.t >= Date.now() - 86400000);
  else if (range === "month") h = h.filter(x => x.t >= Date.now() - 30*86400000);

  if (h.length < 2) {
    area.innerHTML = `
      <div class="chart-empty">
        <div class="chart-empty-icon">📊</div>
        <p>Not enough data yet for this range</p>
        <p style="font-size:11px;font-family:monospace;color:#374151">Hit ↻ Refresh regularly to build up history</p>
      </div>`;
    return;
  }

  const labels = h.map(x => formatDate(x.t, range));
  area.innerHTML = `<div class="chart-wrap"><canvas id="myChart"></canvas></div>`;
  if (chartInstance) chartInstance.destroy();

  chartInstance = new Chart(document.getElementById("myChart").getContext("2d"), {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Regular",
        data: h.map(x => x.v),
        borderColor: "#60a5fa",
        backgroundColor: "#60a5fa18",
        borderWidth: 2,
        pointRadius: h.length > 50 ? 0 : 3,
        pointHoverRadius: 5,
        tension: 0.3,
        fill: true,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: "#111827", borderColor: "rgba(255,255,255,0.1)", borderWidth: 1,
          titleColor: "#9ca3af", bodyColor: "#e5e7eb", padding: 12,
          callbacks: { label: ctx => ` Value: ${formatVal(ctx.raw)}` },
        },
      },
      scales: {
        x: {
          ticks: { color: "#6b7280", font: { family: "DM Mono", size: 10 }, maxTicksLimit: 8 },
          grid: { color: "rgba(255,255,255,0.04)" }
        },
        y: {
          ticks: { color: "#60a5fa", font: { family: "DM Mono", size: 10 }, callback: v => formatVal(v) },
          grid: { color: "rgba(255,255,255,0.04)" },
        },
      },
    },
  });
}

async function loadPets(force = false) {
  const statusEl = document.getElementById("status");
  const grid = document.getElementById("grid");
  const btn = document.getElementById("refreshBtn");
  statusEl.style.display = "flex"; grid.style.display = "none";
  btn.disabled = true; btn.textContent = "Loading…";
  statusEl.innerHTML = `<div class="spinner"></div><p>Scraping Elvebredd… (~20 seconds)</p><p style="font-size:12px;font-family:monospace;color:#4b5563">Make sure server.js is running on port 3001</p>`;

  try {
    const res = await fetch(`${API}/api/pets/all${force ? "?refresh=true" : ""}`);
    if (!res.ok) throw new Error(`Server error ${res.status}`);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);

    // Only show actual pets
   const pets = data.pets;

    markAllSeen(pets);
    newPetNames = new Set(pets.filter(p => isNewPet(p.name)).map(p => p.name));
    allPets = pets;

    // Log history
    for (const p of allPets) logValue(p.name, p.value);
    saveLocalHistory();

    detectMovers();

    statusEl.style.display = "none";
    grid.style.display = "grid";
    render();

  } catch(err) {
    statusEl.innerHTML = `
      <div class="error-box">⚠ ${err.message}<br><br>
      Make sure <strong>node server.js</strong> is running in your VS Code terminal</div>
      <button class="retry-btn" onclick="loadPets()">Try Again</button>`;
  } finally {
    btn.disabled = false;
    btn.textContent = "↻ Refresh";
  }
}

// Events
document.getElementById("search").addEventListener("input", e => { searchQuery = e.target.value.toLowerCase(); render(); });

document.getElementById("filters").addEventListener("click", e => {
  const btn = e.target.closest(".filter-btn");
  if (!btn) return;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  activeRarity = btn.dataset.rarity;
  render();
});

document.getElementById("refreshBtn").addEventListener("click", () => loadPets(true));
document.getElementById("closeModal").addEventListener("click", closeModal);
document.getElementById("modal-overlay").addEventListener("click", e => {
  if (e.target === document.getElementById("modal-overlay")) closeModal();
});

document.getElementById("variantTabs").addEventListener("click", e => {
  const tab = e.target.closest(".variant-tab");
  if (!tab || !currentPet) return;
  document.querySelectorAll(".variant-tab").forEach(t => t.classList.remove("active"));
  tab.classList.add("active");
  currentVariant = tab.dataset.variant;
  updateModalValues(currentPet, currentVariant);
});

document.getElementById("rangeTabs").addEventListener("click", e => {
  const tab = e.target.closest(".range-tab");
  if (!tab || !currentPet) return;
  document.querySelectorAll(".range-tab").forEach(t => t.classList.remove("active"));
  tab.classList.add("active");
  currentRange = tab.dataset.range;
  renderLocalChart(currentPet, currentRange);
});

document.getElementById("grid").addEventListener("click", e => {
  const card = e.target.closest(".pet-card");
  if (!card) return;
  const pet = allPets.find(p => p.name === card.dataset.name);
  if (pet) openModal(pet);
});

document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

document.getElementById("seriesToggle").addEventListener("click", e => {
  const btn = e.target.closest(".series-btn");
  if (!btn || !chartInstance) return;
  const idx = parseInt(btn.dataset.series);
  const meta = chartInstance.getDatasetMeta(idx);
  meta.hidden = !meta.hidden;
  btn.classList.toggle("active", !meta.hidden);
  chartInstance.update();
});

loadPets();
</script>
</body>
</html>
